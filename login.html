<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login & Register - WishSchool</title>
    <link rel="stylesheet" href="reset.css">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="auth-page">
    <div class="auth-container">
        <div class="auth-box">
            <div class="auth-header">
                <h1><i class="fas fa-graduation-cap"></i> WishSchool</h1>
                <p>Quality Education Platform</p>
            </div>

            <!-- Login Form -->
            <form class="auth-form" id="loginForm">
                <h2>Login</h2>

                <div class="form-group">
                    <label for="loginEmail">Email Address</label>
                    <input type="email" id="loginEmail" name="email" placeholder="Enter your email" required>
                    <span class="error-message" id="loginEmailError"></span>
                </div>

                <div class="form-group">
                    <label for="loginPassword">Password</label>
                    <div class="password-wrapper">
                        <input type="password" id="loginPassword" name="password" placeholder="Enter your password" required>
                        <button type="button" class="toggle-password" id="toggleLoginPassword" title="Show/Hide password">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                    <span class="error-message" id="loginPasswordError"></span>
                </div>

                <div class="form-options">
                    <label class="remember-me">
                        <input type="checkbox" id="rememberMe">
                        <span>Remember me</span>
                    </label>
                    <a href="#" class="forgot-password">Forgot password?</a>
                </div>

                <button type="submit" class="btn-submit">Login</button>
                <div id="loginMessage" class="form-message"></div>
            </form>

            <!-- Register Form -->
            <form class="auth-form hidden" id="registerForm">
                <h2>Create Account</h2>

                <div class="form-group">
                    <label for="registerName">Full Name</label>
                    <input type="text" id="registerName" name="name" placeholder="Enter your full name" required>
                    <span class="error-message" id="registerNameError"></span>
                </div>

                <div class="form-group">
                    <label for="registerEmail">Email Address</label>
                    <input type="email" id="registerEmail" name="email" placeholder="Enter your email" required>
                    <span class="error-message" id="registerEmailError"></span>
                </div>

                <div class="form-group">
                    <label for="registerPassword">Password</label>
                    <div class="password-wrapper">
                        <input type="password" id="registerPassword" name="password" placeholder="Create a password" required>
                        <button type="button" class="toggle-password" id="toggleRegisterPassword" title="Show/Hide password">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                    <span class="error-message" id="registerPasswordError"></span>
                    <small class="password-hint">Must be at least 6 characters</small>
                </div>

                <div class="form-group">
                    <label for="registerConfirm">Confirm Password</label>
                    <div class="password-wrapper">
                        <input type="password" id="registerConfirm" name="confirm" placeholder="Confirm your password" required>
                        <button type="button" class="toggle-password" id="toggleConfirmPassword" title="Show/Hide password">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                    <span class="error-message" id="registerConfirmError"></span>
                </div>

                <div class="form-group checkbox">
                    <label>
                        <input type="checkbox" id="agreeTerms" required>
                        <span>I agree to the Terms and Conditions</span>
                    </label>
                    <span class="error-message" id="termsError"></span>
                </div>

                <button type="submit" class="btn-submit">Create Account</button>
                <div id="registerMessage" class="form-message"></div>
            </form>

            <!-- Toggle Forms -->
            <div class="auth-toggle">
                <p id="toggleText">Don't have an account? 
                    <button type="button" class="toggle-btn" id="toggleFormBtn">Sign up</button>
                </p>
            </div>
        </div>

        <!-- Back to Home -->
        <a href="index.html" class="back-home">
            <i class="fas fa-home"></i> Back to Home
        </a>
    </div>

    <script src="script.js"></script>
</body>
</html>
